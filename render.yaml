services:
  - type: cron
    name: optibot-indexer
    runtime: docker
    schedule: "0 3 * * *"
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHAT_PROVIDER
        value: "gemini"
      - key: GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      - key: GEMINI_FILE_SEARCH_STORE_NAME
        sync: false
      - key: GEMINI_FILE_SEARCH_STORE_DISPLAY_NAME
        value: "optibot-help-center"
      - key: GEMINI_EMBEDDING_MODEL
        value: "models/gemini-embedding-2"
      - key: UPLOAD_PROVIDER
        value: "gemini"
      - key: ARTICLE_LIMIT
        value: "30"
      - key: UPLOAD_ENABLED
        value: "true"
