services:
  - type: web
    name: optibot-chatbot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHAT_PROVIDER
        value: "gemini"
      - key: GEMINI_MODEL
        value: "gemini-3.1-flash-lite"
      - key: GEMINI_FILE_SEARCH_STORE_NAME
        sync: false
